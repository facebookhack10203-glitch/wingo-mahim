<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DARK SERVER</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:'Rajdhani',sans-serif;
color:#fff;
}

/* MATRIX */

#matrix{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
opacity:0.28;
}

/* MAIN */

.container{
position:relative;
z-index:2;
width:100%;
height:100%;
overflow-y:auto;
padding:20px 15px 50px;
display:flex;
justify-content:flex-start;
align-items:center;
flex-direction:column;
}

/* HEADER */

.header{
text-align:center;
margin-top:10px;
margin-bottom:20px;
}

.header h1{
font-family:'Orbitron',sans-serif;
font-size:42px;
font-weight:900;
line-height:1.1;
color:#ff1a1a;
text-shadow:
0 0 10px #ff0000,
0 0 20px #ff0000,
0 0 40px #ff0000;
letter-spacing:2px;
}

.header p{
margin-top:10px;
font-size:20px;
color:#ffb3b3;
letter-spacing:1px;
text-shadow:0 0 10px #ff0000;
}

/* LOGIN */

.login-box{
width:100%;
max-width:380px;
padding:30px 25px;
margin-top:25px;
border-radius:25px;
background:rgba(25,0,0,0.78);
border:2px solid #ff3333;
box-shadow:
0 0 25px rgba(255,0,0,0.5),
inset 0 0 15px rgba(255,0,0,0.15);
backdrop-filter:blur(4px);
}

.login-box input{
width:100%;
padding:18px;
border:none;
outline:none;
border-radius:15px;
background:rgba(255,0,0,0.12);
color:#fff;
font-size:20px;
text-align:center;
margin-bottom:18px;
}

.login-box input::placeholder{
color:#bbb;
}

.login-box input:focus{
box-shadow:0 0 15px #ff0000;
background:rgba(255,0,0,0.2);
}

.login-box button{
width:100%;
padding:18px;
border:none;
border-radius:16px;
font-size:20px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
margin-top:10px;
font-family:'Rajdhani',sans-serif;
}

.unlock-btn{
background:linear-gradient(45deg,#ff0055,#ff3d3d);
color:#fff;
box-shadow:0 0 18px rgba(255,0,0,0.5);
}

.unlock-btn:hover{
transform:scale(1.03);
}

.getkey-btn{
background:#b30000;
color:#fff;
}

.getkey-btn:hover{
background:#ff1a1a;
}

#error{
margin-top:12px;
font-size:15px;
color:#ff8888;
text-align:center;
}

/* PANEL */

.main{
display:none;
width:100%;
max-width:400px;
text-align:center;
}

/* TIME */

.live-time{
font-family:'Orbitron',sans-serif;
font-size:30px;
margin-top:10px;
margin-bottom:20px;
color:#ffd6d6;
text-shadow:0 0 12px #ff0000;
}

/* TIMER */

.timer-circle{
width:120px;
height:120px;
border-radius:50%;
margin:0 auto 25px;
position:relative;
border:6px solid #ff3333;
background:
conic-gradient(
#ff003c calc(var(--progress) * 1%),
#1b0000 calc(var(--progress) * 1%)
);
box-shadow:
0 0 25px rgba(255,0,0,0.6),
0 0 50px rgba(255,0,0,0.2);
}

.timer-circle::before{
content:attr(data-time);
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-family:'Orbitron',sans-serif;
font-size:30px;
font-weight:900;
color:#fff;
text-shadow:0 0 15px #ff0000;
}

/* SIGNAL BOX */

.signal-box{
padding:30px 20px;
border-radius:25px;
background:rgba(80,0,0,0.45);
border:2px solid #ff3d3d;
box-shadow:
0 0 30px rgba(255,0,0,0.55),
inset 0 0 15px rgba(255,0,0,0.15);
}

.signal-text{
font-family:'Orbitron',sans-serif;
font-size:65px;
font-weight:900;
color:#ff1a1a;
text-shadow:
0 0 12px #ff0000,
0 0 25px #ff0000;
margin-bottom:25px;
}

.numbers{
display:inline-block;
padding:18px 40px;
border-radius:18px;
background:#8B0000;
border:2px solid #ff4d4d;
font-size:52px;
font-weight:bold;
box-shadow:0 0 20px rgba(255,0,0,0.6);
}

/* HISTORY */

.history-box{
margin-top:25px;
border-radius:22px;
overflow:hidden;
border:2px solid #ff3333;
background:rgba(20,0,0,0.65);
box-shadow:
0 0 20px rgba(255,0,0,0.45),
inset 0 0 12px rgba(255,0,0,0.15);
max-height:250px;
overflow-y:auto;
}

.history-box table{
width:100%;
border-collapse:collapse;
}

.history-box th{
background:#990000;
padding:15px 8px;
font-size:18px;
color:#fff;
font-family:'Orbitron',sans-serif;
}

.history-box td{
padding:12px 6px;
font-size:17px;
border-top:1px solid rgba(255,255,255,0.08);
}

/* BUTTON */

.channel-btn{
display:inline-block;
margin-top:30px;
padding:18px 35px;
border-radius:18px;
text-decoration:none;
font-size:22px;
font-weight:bold;
background:linear-gradient(45deg,#ff0055,#ff5252);
color:#fff;
box-shadow:
0 0 20px rgba(255,0,0,0.6);
transition:0.3s;
}

.channel-btn:hover{
transform:scale(1.05);
}

/* MOBILE */

@media(max-width:480px){

.header h1{
font-size:34px;
}

.signal-text{
font-size:55px;
}

.numbers{
font-size:42px;
padding:16px 35px;
}

.timer-circle{
width:100px;
height:100px;
}

.timer-circle::before{
font-size:24px;
}

.live-time{
font-size:24px;
}

.channel-btn{
font-size:20px;
padding:16px 30px;
}

}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<!-- HEADER -->

<div class="header">
<h1>DARK SERVER</h1>
<p>WINGO 30S FREE SERVER</p>
</div>

<!-- LOGIN -->

<div class="login-box" id="loginBox">

<input
type="password"
id="passInput"
placeholder="Enter Access Key">

<button
class="unlock-btn"
onclick="unlock()">
UNLOCK PANEL
</button>

<button
class="getkey-btn"
onclick="window.open('https://t.me/dark_server_v1_bot')">
SERVER CONNECT করুন
</button>

<div id="error"></div>

</div>

<!-- MAIN PANEL -->

<div class="main" id="mainPanel">

<div class="header">
<h1>DARK SERVER</h1>
<p>WINGO 30S FREE SERVER</p>
</div>

<div class="live-time" id="liveTime">
00:00:00
</div>

<div
class="timer-circle"
id="timerCircle"
data-time="00:30"
style="--progress:0%;">
</div>

<div class="signal-box">

<div class="signal-text" id="signal">
WAIT
</div>

<div class="numbers" id="nums">
-- --
</div>

</div>

<!-- HISTORY -->

<div class="history-box">

<table id="historyTable">

<thead>
<tr>
<th>TIME</th>
<th>SIGNAL</th>
<th>NUMBERS</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<!-- TELEGRAM -->

<a
href="https://t.me/dark_server_v1_bot"
target="_blank"
class="channel-btn">
JOIN TELEGRAM
</a>

</div>

</div>

<script>

/* MATRIX EFFECT */

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars = "01红火烈光电心";
const fontSize = 16;
const columns = canvas.width / fontSize;

const drops = Array(Math.floor(columns)).fill(1);

function draw(){

ctx.fillStyle = "rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle = "#ff1a1a";
ctx.font = fontSize + "px monospace";

for(let i=0;i<drops.length;i++){

const text =
chars[Math.floor(Math.random()*chars.length)];

ctx.fillText(
text,
i*fontSize,
drops[i]*fontSize
);

if(
drops[i]*fontSize > canvas.height &&
Math.random() > 0.975
){
drops[i] = 0;
}

drops[i]++;

}

}

setInterval(draw,50);

/* LOGIN */

function unlock(){

const key =
document.getElementById("passInput").value;

if(key === "PANEL123"){

document.getElementById("loginBox").style.display =
"none";

document.getElementById("mainPanel").style.display =
"block";

startPanel();

}else{

document.getElementById("error").innerText =
"Wrong Password!";

setTimeout(()=>{
document.getElementById("error").innerText = "";
},2000);

}

}

/* START PANEL */

function startPanel(){

updateClock();

setInterval(updateClock,1000);

startTimer();

}

/* LIVE TIME */

function updateClock(){

const now = new Date();

document.getElementById("liveTime").innerText =
now.toLocaleTimeString("en-US",{hour12:false});

}

/* TIMER */

function startTimer(){

const now = new Date();

const sec = now.getSeconds();

const ms = now.getMilliseconds();

const next = sec < 30 ? 30 : 60;

const delay =
(next-sec)*1000 - ms;

startCountdown(next-sec);

setTimeout(()=>{

generateSignal();

startCountdown(30);

setInterval(()=>{

generateSignal();

startCountdown(30);

},30000);

},delay);

}

function startCountdown(seconds){

let count = seconds;

const circle =
document.getElementById("timerCircle");

clearInterval(window.countdown);

window.countdown = setInterval(()=>{

count--;

const secStr =
String(count).padStart(2,"0");

circle.setAttribute(
"data-time",
`00:${secStr}`
);

const progress =
((seconds-count)/seconds)*100;

circle.style.setProperty(
"--progress",
progress + "%"
);

if(count <= 0){
clearInterval(window.countdown);
}

},1000);

}

/* SIGNAL */

function generateSignal(){

const now = new Date();

const time =
now.toLocaleTimeString(
"en-US",
{hour12:false}
);

const isBig =
Math.random() < 0.5;

const signal =
isBig ? "BIG" : "SMALL";

const nums =
isBig
? getTwo(5,9)
: getTwo(0,4);

/* UPDATE */

document.getElementById("signal").innerText =
signal;

document.getElementById("nums").innerText =
nums[0] + " " + nums[1];

/* HISTORY */

const tbody =
document.querySelector("#historyTable tbody");

const row = `
<tr>
<td>${time}</td>
<td>${signal}</td>
<td>${nums[0]} ${nums[1]}</td>
</tr>
`;

tbody.insertAdjacentHTML("afterbegin",row);

/* LIMIT */

while(tbody.rows.length > 10){

tbody.deleteRow(
tbody.rows.length - 1
);

}

}

/* NUMBER */

function getTwo(min,max){

let a =
Math.floor(Math.random()*(max-min+1))+min;

let b;

do{

b =
Math.floor(Math.random()*(max-min+1))+min;

}
while(a===b);

return [a,b];

}

</script>

</body>
</html>
